<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
    <div style="background: #f8f9fa; border-radius: 8px; padding: 30px; text-align: center;">
        <h2 style="color: #333;">Reset Your Password</h2>
        <p style="color: #666;">Hi {{ user_name }},</p>
        <p style="color: #666;">You requested a password reset for your {{ site_name }} account. Click the button below:</p>
        <div style="margin: 25px 0;">
            <a href="{{ reset_link }}" style="background: #0d6efd; color: #fff; padding: 12px 30px; border-radius: 6px; text-decoration: none; font-weight: bold;">Reset Password</a>
        </div>
        <p style="color: #999; font-size: 14px;">If you didn't request this, you can safely ignore this email.</p>
        <p style="color: #999; font-size: 14px;">This link will expire in 30 minutes.</p>
        <hr style="border: none; border-top: 1px solid #dee2e6; margin: 20px 0;">
        <p style="color: #999; font-size: 12px;">&copy; {{ current_year }} {{ site_name }}</p>
    </div>
</body>
</html>
