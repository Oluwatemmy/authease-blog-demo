<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
    <div style="background: #f8f9fa; border-radius: 8px; padding: 30px; text-align: center;">
        <h2 style="color: #333;">Verify Your Email</h2>
        <p style="color: #666;">Hi {{ user_name }},</p>
        <p style="color: #666;">Welcome to {{ site_name }}! Use the code below to verify your email address:</p>
        <div style="background: #fff; border: 2px dashed #0d6efd; border-radius: 8px; padding: 20px; margin: 20px 0;">
            <span style="font-size: 32px; font-weight: bold; letter-spacing: 8px; color: #0d6efd;">{{ otp_code }}</span>
        </div>
        <p style="color: #999; font-size: 14px;">This code expires in 15 minutes.</p>
        <hr style="border: none; border-top: 1px solid #dee2e6; margin: 20px 0;">
        <p style="color: #999; font-size: 12px;">&copy; {{ current_year }} {{ site_name }}</p>
    </div>
</body>
</html>
