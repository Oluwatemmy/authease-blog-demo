{% extends "blog/base.html" %}

{% block title %}Login - BlogApp{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card border-0 shadow-sm" style="border-radius: 12px;">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Welcome Back</h2>
                    <p class="text-muted">Sign in to continue</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="email" class="form-label small fw-semibold">Email</label>
                        <input type="email" class="form-control border-0 bg-light" id="email" name="email"
                               value="{{ email|default:'' }}" placeholder="you@example.com" style="border-radius: 10px;" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label small fw-semibold">Password</label>
                        <input type="password" class="form-control border-0 bg-light" id="password" name="password"
                               placeholder="Your password" style="border-radius: 10px;" required>
                    </div>
                    <button type="submit" class="btn btn-brand w-100 rounded-pill py-2 fw-semibold mb-3">Login</button>
                </form>
                <p class="text-center mb-2">
                    <a href="{% url 'authease-password-reset' %}" class="text-muted small text-decoration-none">Forgot password?</a>
                </p>
                <p class="text-center text-muted small mb-0">
                    Don't have an account? <a href="{% url 'authease-register' %}" class="text-decoration-none fw-semibold">Sign up</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
