{% extends "blog/base.html" %}

{% block title %}Set New Password - BlogApp{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card border-0 shadow-sm" style="border-radius: 12px;">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="bg-success bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 64px; height: 64px;">
                        <i class="bi bi-shield-lock display-6 text-success"></i>
                    </div>
                    <h3 class="fw-bold">Set New Password</h3>
                    <p class="text-muted">Choose a strong password for your account.</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="password" class="form-label small fw-semibold">New Password</label>
                        <input type="password" class="form-control border-0 bg-light" id="password" name="password"
                               placeholder="Enter new password" style="border-radius: 10px;" required>
                    </div>
                    <div class="mb-4">
                        <label for="confirm_password" class="form-label small fw-semibold">Confirm New Password</label>
                        <input type="password" class="form-control border-0 bg-light" id="confirm_password" name="confirm_password"
                               placeholder="Confirm new password" style="border-radius: 10px;" required>
                    </div>
                    <button type="submit" class="btn btn-brand w-100 rounded-pill py-2 fw-semibold">Reset Password</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
