{% extends "blog/base.html" %}

{% block title %}Reset Password - BlogApp{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card border-0 shadow-sm" style="border-radius: 12px;">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="bg-warning bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 64px; height: 64px;">
                        <i class="bi bi-key display-6 text-warning"></i>
                    </div>
                    <h3 class="fw-bold">Reset Password</h3>
                    <p class="text-muted">Enter your email and we'll send you a link to reset your password.</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="email" class="form-label small fw-semibold">Email</label>
                        <input type="email" class="form-control border-0 bg-light" id="email" name="email"
                               placeholder="you@example.com" style="border-radius: 10px;" required>
                    </div>
                    <button type="submit" class="btn btn-brand w-100 rounded-pill py-2 fw-semibold mb-3">Send Reset Link</button>
                </form>
                <p class="text-center text-muted small mb-0">
                    Remember your password? <a href="{% url 'authease-login' %}" class="text-decoration-none fw-semibold">Login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
